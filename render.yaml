services:
  - type: web
    name: python-aura-crm
    runtime: docker
    autoDeploy: true
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: SYNC_SHARED_KEY
        generateValue: true
